<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View User</title>
    <link rel="stylesheet" href="view.css">
</head>
<body>

<div class="container">
    <h2>View User Account</h2>

    <div class="form-grid">

        <div class="field">
            <label>Account Type</label>
            <input type="text" id="accountType" readonly>
        </div>

        <div class="field">
            <label>Account Status</label>
            <input type="text" id="accountStatus" readonly>
        </div>

        <div class="field">
            <label>First Name</label>
            <input type="text" id="firstName" readonly>
        </div>

        <div class="field">
            <label>Last Name</label>
            <input type="text" id="lastName" readonly>
        </div>

        <div class="field">
            <label>Email</label>
            <input type="text" id="email" readonly>
        </div>

        <div class="field">
            <label>Mobile Number</label>
            <input type="text" id="mobile" readonly>
        </div>

    </div>

    <button onclick="goBack()" class="btn">Back</button>
</div>

<script src="view.js"></script>
</body>
</html>
